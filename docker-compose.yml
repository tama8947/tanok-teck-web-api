services:
  redis-cache:
    image: redis:7-alpine
    container_name: tanok-redis
    volumes:
      - redis-cache-data:/data
    networks:
      - tanok-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tanok-api
    depends_on:
      redis-cache:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://redis-cache:6379"
      JWT_SECRET: "${JWT_SECRET}"
      API_TOKEN: "${API_TOKEN}"
      CRON_SECRET: "${CRON_SECRET}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL}"
      DAILY_POSTS_AUTHOR_ID: "${DAILY_POSTS_AUTHOR_ID}"
      BASE_URL: "https://tanok-web-api.tanok-tech.com"
      CORS_ALLOWED_ORIGINS: "https://tanok-tech.com,https://www.tanok-tech.com"
      GIN_MODE: "release"
      COOKIE_DOMAIN: "tanok-tech.com"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tanok-net
    restart: unless-stopped

networks:
  tanok-net:
    driver: bridge

volumes:
  redis-cache-data:
